<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | PT. Gochem Globalindo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white p-6 sm:p-10 rounded-3xl shadow-sm border border-slate-200">
        <div class="mb-8 text-center">
            <h1 class="text-2xl sm:text-3xl font-bold text-indigo-900 mb-2">PT. Gochem Globalindo</h1>
            <p class="text-slate-500 font-medium text-sm sm:text-base">Sistem Absensi Terintegrasi</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-6 p-4 bg-red-50 text-red-600 border border-red-100 rounded-xl text-sm text-center font-medium">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Username</label>
                <input type="text" name="username" required
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-3.5 text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-indigo-500 outline-none transition-all duration-300">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                <input type="password" name="password" required
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-3.5 text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-indigo-500 outline-none transition-all duration-300">
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all duration-300 shadow-lg shadow-indigo-100 transform active:scale-[0.98]">
                Masuk Sekarang
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest font-semibold">© 2026 PT. Gochem Globalindo</p>
        </div>
    </div>

</body>
</html>
